name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      # DB tests always run in CI (the conftest fixture hard-fails, rather
      # than skips, when CI is set and this container is unreachable).
      postgis:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: shade
          POSTGRES_PASSWORD: shade
          POSTGRES_DB: shade
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shade -d shade"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest
        env:
          SHADE_TEST_DATABASE_URL: postgresql+psycopg://shade:shade@localhost:5432/shade
